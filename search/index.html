<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>
    
      Search · Avandar2024&#x27;s blog
    
  </title>
  <meta name="description" content="Personal writing about coding and life.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="https://Avandar2024.github.io/blog/main.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (!window.renderMathInElement) return;
      renderMathInElement(document.body, {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "$", right: "$", display: false }
        ],
        throwOnError: false
      });
    });
  </script>
</head>
<body>
  <a class="skip-link" href="#main-content">跳到正文</a>

  <div class="language-switch" aria-label="当前语言">
    <span aria-current="true">简体中文</span>
  </div>

  <div class="shell">
    <header class="site-header">
      <a class="brand" href="https://Avandar2024.github.io/blog">
        <img class="brand-mark" src="https://Avandar2024.github.io/blog/brand-mark.svg" alt="" aria-hidden="true">
        <span>Avandar2024&#x27;s blog</span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        
          
            <a href="/">Home</a>
          
        
          
            <a href="/about/">About</a>
          
        
          
            <a href="/posts/">Writing</a>
          
        
          
            <span class="nav-placeholder" aria-disabled="true">Category</span>
          
        
          
            <span class="nav-placeholder" aria-disabled="true">Friends</span>
          
        
          
            <a href="/search/">Search</a>
          
        
      </nav>
    </header>

    <main id="main-content" class="content" tabindex="-1">
      
  <section class="search-page" aria-labelledby="search-title">
    <header class="article-header">
      <h1 id="search-title">Search</h1>
      
        <p>Search this blog.</p>
      
    </header>

    <form class="search-form" role="search" aria-label="Site search">
      <label for="search-query">Search query</label>
      <div class="search-row">
        <input id="search-query" name="q" type="search" autocomplete="off" placeholder="BFGS, Zola, coding..." required>
        <button type="submit">Search</button>
      </div>
    </form>

    <p id="search-status" class="search-status" role="status" aria-live="polite">Enter a query to search posts and pages.</p>
    <ol id="search-results" class="search-results"></ol>
  </section>

  <script defer src="https://Avandar2024.github.io/blog/search_index.en.js"></script>
  <script defer src="https://Avandar2024.github.io/blog/search.js"></script>

    </main>

    <footer class="site-footer">
      <p>Copyright &copy; 2018-2026 Avandar2024</p>
      <nav class="site-nav site-nav-footer" aria-label="页脚导航">
        
          
            <a href="/">Home</a>
          
        
          
            <a href="/about/">About</a>
          
        
          
            <a href="/posts/">Writing</a>
          
        
          
            <span class="nav-placeholder" aria-disabled="true">Category</span>
          
        
          
            <span class="nav-placeholder" aria-disabled="true">Friends</span>
          
        
          
            <a href="/search/">Search</a>
          
        
      </nav>
    </footer>
  </div>
</body>
</html>
