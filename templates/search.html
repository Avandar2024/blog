{% extends "base.html" %}

{% block content %}
  <section class="search-page" aria-labelledby="search-title">
    <header class="article-header">
      <h1 id="search-title">{{ page.title }}</h1>
      {% if page.description %}
        <p>{{ page.description }}</p>
      {% endif %}
    </header>

    <form class="search-form" role="search" aria-label="Site search">
      <label for="search-query">Search query</label>
      <div class="search-row">
        <input id="search-query" name="q" type="search" autocomplete="off" placeholder="BFGS, Zola, coding..." required>
        <button type="submit">Search</button>
      </div>
    </form>

    <p id="search-status" class="search-status" role="status" aria-live="polite">Enter a query to search posts and pages.</p>
    <ol id="search-results" class="search-results"></ol>
  </section>

  <script defer src="{{ get_url(path="search_index.en.js") }}"></script>
  <script defer src="{{ get_url(path="search.js") }}"></script>
{% endblock content %}
